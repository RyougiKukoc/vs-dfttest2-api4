name: Build Windows DFTTest2

on:
  push:
    branches:
      - master
    tags:
      - cpu
      - cu121
      - cu129
    paths:
      - "CMakeLists.txt"
      - "common/**"
      - "cpu_source/**"
      - "cuda_source/**"
      - "dfttest2/**"
      - "dfttest2.py"
      - "hatch_build.py"
      - "nvrtc_source/**"
      - "pyproject.toml"
      - "tools/**"
      - ".github/workflows/windows.yml"
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "common/**"
      - "cpu_source/**"
      - "cuda_source/**"
      - "dfttest2/**"
      - "dfttest2.py"
      - "hatch_build.py"
      - "nvrtc_source/**"
      - "pyproject.toml"
      - "tools/**"
      - ".github/workflows/windows.yml"
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload artifacts to the cpu, cu121, and cu129 releases"
        default: false
        type: boolean
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: windows-2025

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            cuda_enabled: false
            cuda_version: ""
            cudart_version: ""
            nvrtc_version: ""
            nvcc_version: ""
            nvjitlink_version: ""
            cufft_version: ""
            extra_cuda_packages: ""
          - variant: cu121
            cuda_enabled: true
            cuda_version: 12.1.1
            cudart_version: 12.1.105
            nvrtc_version: 12.1.105
            nvcc_version: 12.1.105
            nvjitlink_version: 12.1.105
            cufft_version: 11.0.2.54
            extra_cuda_packages: ""
          - variant: cu129
            cuda_enabled: true
            cuda_version: 12.9.1
            cudart_version: 12.9.79
            nvrtc_version: 12.9.86
            nvcc_version: 12.9.86
            nvjitlink_version: 12.9.86
            cufft_version: 11.4.1.4
            extra_cuda_packages: "libnvfatbin=12.9.82 libnvfatbin-dev=12.9.82 libnvfatbin-static=12.9.82"

    defaults:
      run:
        shell: cmd

    env:
      DFTTEST2_VARIANT: ${{ matrix.variant }}
      DFTTEST2_CUDA_VARIANT: ${{ matrix.variant }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up CPython
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: >-
          "%pythonLocation%\python.exe" -m pip install --upgrade pip build hatchling packaging cmake ninja

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CUDA static packages
        if: ${{ matrix.cuda_enabled }}
        id: cuda
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: cuda-${{ matrix.variant }}
          init-shell: none
          cache-downloads: true
          post-cleanup: environment
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          create-args: >-
            cuda-cudart-dev=${{ matrix.cudart_version }}
            cuda-nvrtc=${{ matrix.nvrtc_version }}
            cuda-nvrtc-dev=${{ matrix.nvrtc_version }}
            cuda-nvrtc-static=${{ matrix.nvrtc_version }}
            cuda-nvcc=${{ matrix.nvcc_version }}
            libnvjitlink=${{ matrix.nvjitlink_version }}
            libnvjitlink-dev=${{ matrix.nvjitlink_version }}
            libnvjitlink-static=${{ matrix.nvjitlink_version }}
            libcufft=${{ matrix.cufft_version }}
            libcufft-dev=${{ matrix.cufft_version }}
            ${{ matrix.extra_cuda_packages }}

      - name: Show CUDA package layout
        if: ${{ matrix.cuda_enabled }}
        run: |
          set "CUDA_ROOT=${{ steps.cuda.outputs.environment-path }}\Library"
          echo CUDA_ROOT=%CUDA_ROOT%
          dir "%CUDA_ROOT%\include\nvrtc.h"
          dir "%CUDA_ROOT%\lib\cuda.lib"
          dir "%CUDA_ROOT%\lib\nvrtc_static.lib"
          dir "%CUDA_ROOT%\lib\nvrtc-builtins_static.lib"
          dir "%CUDA_ROOT%\lib\nvptxcompiler_static.lib"
          dir "%CUDA_ROOT%\lib\cufft.lib"
          dir "%CUDA_ROOT%\bin\cufft64_*.dll"

      - name: Prepare VapourSynth R77 wheel
        run: >-
          "%pythonLocation%\python.exe" tools\ci_prepare_windows.py

      - name: Build CPU-only package directory
        if: ${{ !matrix.cuda_enabled }}
        run: >-
          "%pythonLocation%\python.exe" tools\ci_build_windows.py
          --clean
          --variant ${{ matrix.variant }}
          --dist-dir dist\windows-${{ matrix.variant }}

      - name: Build CPU/CUDA package directory
        if: ${{ matrix.cuda_enabled }}
        run: >-
          "%pythonLocation%\python.exe" tools\ci_build_windows.py
          --clean
          --variant ${{ matrix.variant }}
          --dist-dir dist\windows-${{ matrix.variant }}
          --cuda-root "${{ steps.cuda.outputs.environment-path }}\Library"

      - name: Smoke-load explicit package
        run: >-
          "%pythonLocation%\python.exe" tools\smoke_load_artifact.py
          --vapoursynth-root _deps\vapoursynth-wheel-R77
          --artifact-dir dist\windows-${{ matrix.variant }}
          --exercise-cpu-filter

      - name: Smoke-load package through manifest autoload
        run: >-
          "%pythonLocation%\python.exe" tools\smoke_load_artifact.py
          --vapoursynth-root _deps\vapoursynth-wheel-R77
          --artifact-dir dist\windows-${{ matrix.variant }}
          --autoload
          --exercise-cpu-filter

      - name: Pack release zip
        run: >-
          "%pythonLocation%\python.exe" tools\package_plugin_zip.py
          --variant ${{ matrix.variant }}
          --input-dir dist\windows-${{ matrix.variant }}
          --output dist\dfttest2-${{ matrix.variant }}-win64.zip

      - name: Build wheel from local prebuilt package
        env:
          DFTTEST2_PREBUILT_URL: ${{ github.workspace }}\dist\dfttest2-${{ matrix.variant }}-win64.zip
        run: >-
          "%pythonLocation%\python.exe" -m build --wheel --no-isolation --outdir dist\wheels-${{ matrix.variant }}

      - name: Install built wheel
        run: >-
          for %%I in (dist\wheels-${{ matrix.variant }}\*.whl) do "%pythonLocation%\python.exe" -m pip install --force-reinstall "%%~fI"

      - name: Smoke test installed wheel
        run: >-
          "%pythonLocation%\python.exe" tools\smoke_installed_wheel.py --exercise-cpu-filter

      - name: Smoke test source install with prebuilt package
        env:
          DFTTEST2_PREBUILT_URL: ${{ github.workspace }}\dist\dfttest2-${{ matrix.variant }}-win64.zip
        run: |
          "%pythonLocation%\python.exe" -m pip uninstall -y vapoursynth-dfttest2
          "%pythonLocation%\python.exe" -m pip install --force-reinstall --no-deps --no-build-isolation -v .
          "%pythonLocation%\python.exe" tools\smoke_installed_wheel.py --exercise-cpu-filter

      - name: Upload package directory
        uses: actions/upload-artifact@v4
        with:
          name: dfttest2-${{ matrix.variant }}-package
          path: dist/windows-${{ matrix.variant }}

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfttest2-${{ matrix.variant }}-release-zip
          path: dist/dfttest2-${{ matrix.variant }}-win64.zip

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfttest2-${{ matrix.variant }}-wheel-win64
          path: dist/wheels-${{ matrix.variant }}

      - name: Upload release assets
        if: |
          (startsWith(github.ref, 'refs/tags/') && github.ref_name == matrix.variant) ||
          (github.event_name == 'release' && github.event.release.tag_name == matrix.variant) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_release == 'true')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ matrix.variant }}
        run: |
          $tag = $env:RELEASE_TAG
          $assets = @("dist\dfttest2-${{ matrix.variant }}-win64.zip")
          $assets += Get-ChildItem "dist\wheels-${{ matrix.variant }}\*.whl" | Select-Object -ExpandProperty FullName
          & cmd.exe /d /c "gh release view $tag --repo $env:GITHUB_REPOSITORY >NUL 2>NUL"
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $assets --title $tag --notes "Automated DFTTest2 ${{ matrix.variant }} Windows build." --repo $env:GITHUB_REPOSITORY
          }
